name: Security Audit

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Run weekly on Mondays
    - cron: '0 0 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    name: Cargo Audit (Rust Dependencies)
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        working-directory: ./rust
        run: cargo audit

  docker-security-scan:
    runs-on: ubuntu-latest
    name: Docker Image Security Scan
    strategy:
      matrix:
        dockerfile:
          - path: ./specification/Dockerfile
            context: ./specification
            name: specification
          - path: ./java/otlp-mmap/Dockerfile
            context: ./java/otlp-mmap
            name: java-otlp-mmap
          - path: ./python/Dockerfile
            context: .
            name: python
          - path: ./python/otlp-mmap-example-server/Dockerfile
            context: .
            name: python-example-server
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ${{ matrix.dockerfile.context }}
          file: ${{ matrix.dockerfile.path }}
          push: false
          load: true
          tags: ${{ matrix.dockerfile.name }}:test

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518 # v0.30.0
        with:
          image-ref: ${{ matrix.dockerfile.name }}:test
          format: 'sarif'
          output: 'trivy-results-${{ matrix.dockerfile.name }}.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v3.28.6
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.dockerfile.name }}.sarif'
