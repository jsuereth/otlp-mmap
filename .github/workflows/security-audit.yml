name: Security Audit

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Run weekly on Mondays
    - cron: '0 0 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    name: Cargo Audit (Rust Dependencies)
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        working-directory: ./rust
        run: cargo audit

  docker-security-scan:
    runs-on: ubuntu-latest
    name: Docker Image Security Scan
    strategy:
      matrix:
        dockerfile:
          - path: ./specification/Dockerfile
            context: ./specification
            name: specification
          - path: ./java/otlp-mmap/Dockerfile
            context: ./java/otlp-mmap
            name: java-otlp-mmap
          - path: ./python/Dockerfile
            context: .
            name: python
          - path: ./python/otlp-mmap-example-server/Dockerfile
            context: .
            name: python-example-server
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ matrix.dockerfile.context }}
          file: ${{ matrix.dockerfile.path }}
          push: false
          load: true
          tags: ${{ matrix.dockerfile.name }}:test

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.30.0
        with:
          image-ref: ${{ matrix.dockerfile.name }}:test
          format: 'sarif'
          output: 'trivy-results-${{ matrix.dockerfile.name }}.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3.28.6
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.dockerfile.name }}.sarif'
