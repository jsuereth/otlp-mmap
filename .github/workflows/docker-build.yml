name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO_OWNER: ${{ github.repository_owner }}

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: mmap-demo
            dockerfile: ./java/otlp-mmap/Dockerfile
            context: ./java/otlp-mmap
          - image: mmap-collector
            dockerfile: ./rust/mmap-collector.Dockerfile
            context: ./rust
          - image: mmap-python-demo
            dockerfile: ./python/otlp-mmap-example-server/Dockerfile
            context: .
          # - image: otlp-mmap-python-base
          #   dockerfile: ./rust/python-lib.Dockerfile
          #   context: ./rust

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: setup-buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: gh-docker-login
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: extract-meta ${{ matrix.image }}
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ matrix.image }}
          tags: |
            type=schedule,pattern=nightly
            type=ref,event=branch
            type=semver,pattern=v{{version}}
            type=sha,format=short

      - name: build-push ${{ matrix.image }}
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: report-digest
        run: |
          echo "Image ${{ matrix.image }} pushed with digest: ${{ steps.push.outputs.digest }}"
